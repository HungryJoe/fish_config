version = 3
final_space = true
async = true

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    leading_diamond = 'Ôò¡ÔöÇ¯é▓'
    template = ' {{ .Icon }} '
    foreground = '#f2f3f8'
    background = '#d75f00'
    type = 'os'
    style = 'diamond'

    [blocks.segments.properties]
      alpine = '´îÇ'
      arch = '´îâ'
      centos = '´îä'
      debian = '´îå'
      elementary = '´îë'
      fedora = '´îè'
      gentoo = '´îì'
      linux = '¯£Æ'
      macos = '¯£æ'
      manjaro = '´îÆ'
      mint = '´îÅ'
      opensuse = '´îö'
      raspbian = '´îò'
      ubuntu = '´î£'
      windows = '¯£Å'

  [[blocks.segments]]
    template = ' {{ .UserName }} '
    foreground = '#4e4e4e'
    powerline_symbol = '¯é░'
    background = '#e4e4e4'
    type = 'session'
    style = 'powerline'

  [[blocks.segments]]
    template = ' {{ .Path }} '
    foreground = '#f2f3f8'
    powerline_symbol = '¯é░'
    background = '#0087af'
    type = 'path'
