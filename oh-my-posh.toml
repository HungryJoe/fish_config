    [blocks.segments.properties]
      folder_icon = 'ÔÇª'
      folder_separator_icon = ' <transparent>¯é▒</> '
      max_depth = 3.0
      style = 'unique'

  [[blocks.segments]]
    leading_diamond = '<transparent,background>¯é░</>'
    trailing_diamond = '¯é░'
    template = ' {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} <transparent>¯é▒</> <#121318>´üä {{ .Working.String }}</>{{ end }}{{ if .Staging.Changed }} <transparent>¯é▒</> <#121318>´üå {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }} <transparent>¯é▒</> <#121318>¯¡ï {{ .StashCount }}</>{{ end }} '
    foreground = '#f2f3f8'
    background = '#378504'
    type = 'git'
    style = 'diamond'
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#a97400{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#54433a{{ end }}', '{{ if gt .Ahead 0 }}#744d89{{ end }}', '{{ if gt .Behind 0 }}#744d89{{ end }}']

    [blocks.segments.properties]
      branch_gone_icon = '¯¬©'
      branch_icon = '´Éÿ '
      branch_identical_icon = '´æä'
      branch_template = '{{ trunc 25 .Branch }}'
      fetch_status = true

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    template = ' ¯«ó {{ .FormattedMs }} '
    foreground = '#585858'
    powerline_symbol = '¯é▓'
    background = '#e4e4e4'
    type = 'executiontime'
    style = 'powerline'
    invert_powerline = true

    [blocks.segments.properties]
      always_enabled = true
      style = 'austin'

  [[blocks.segments]]
    trailing_diamond = '¯é░'
    template = ' ´ü│ {{ .CurrentDate | date .Format }} '
    foreground = '#f2f3f8'
    background = '#d75f00'
    type = 'time'
    style = 'diamond'
    invert_powerline = true

    [blocks.segments.properties]
      time_format = '15:04:05'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'Ôò░ÔöÇ {{ if .Root }}#{{else}}${{end}}'
    foreground = '#d75f00'
    type = 'text'
    style = 'plain'
